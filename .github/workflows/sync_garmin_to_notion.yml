name: Sync Garmin to Notion

on:
  schedule:
    # S'executa cada dia a les 21:30 UTC
    - cron: '30 21 * * *'
  workflow_dispatch:

# Definim totes les variables d'entorn a nivell global perquè qualsevol script les pugui llegir
env:
  TZ: 'Europe/Madrid'
  GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
  NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
  NOTION_PR_DB_ID: ${{ secrets.NOTION_PR_DB_ID }}
  NOTION_STEPS_DB_ID: ${{ secrets.NOTION_STEPS_DB_ID }}
  NOTION_SLEEP_DB_ID: ${{ secrets.NOTION_SLEEP_DB_ID }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Actualitzat a la versió més recent

      - name: Set up Python
        uses: actions/setup-python@v5  # Actualitzat a la v5
        with:
          python-version: '3.11'
          cache: 'pip'  # Això substitueix tot el bloc d'actions/cache que tenies abans!

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Separem els scripts en passos. Així als logs de GitHub veuràs clarament quin falla i quin funciona.
      # continue-on-error: true assegura que si un script cau, la resta s'intentarà executar.

      - name: Run Garmin Activities Sync
        run: python garmin-activities.py
        continue-on-error: true

      - name: Run Personal Records Sync
        run: python personal-records.py
        continue-on-error: true

      - name: Run Daily Steps Sync
        run: python daily-steps.py
        continue-on-error: true

      - name: Run Sleep Data Sync
        run: python sleep-data.py
        continue-on-error: true
